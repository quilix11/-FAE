<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operator Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="header">
        <div class="header__inner">
            <div class="header__title-group">
                <h1 class="header__title">Operator Dashboard</h1>
                <span class="header__subtitle" id="zoneName">Loading…</span>
            </div>
            <span class="header__badge" id="machineCode">—</span>
        </div>
    </header>

    <!-- ── Main content ───────────────────────────────────────── -->
    <main class="main">
        <!-- Capacity section -->
        <section class="capacity-section" id="capacitySection">
            <div class="capacity-header">
                <h2 class="capacity-header__title">Rack Capacity</h2>
                <span class="capacity-header__count" id="capacityCount">— / —</span>
            </div>
            <div class="capacity-bar">
                <div class="capacity-bar__fill" id="capacityFill" style="width: 0%"></div>
            </div>
        </section>

        <div style="margin-bottom: 24px; display: flex; gap: 8px;">
            <input type="text" id="manualScanInput" placeholder="Enter applicator serial..." style="padding: 10px; border: 1px solid var(--border); border-radius: 6px; flex: 1;">
            <button id="manualScanBtn" class="btn" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;">Add</button>
        </div>

        <!-- Applicator card grid -->
        <section class="card-grid" id="cardGrid">
            <!-- Cards rendered by app.js -->
        </section>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" hidden>
            <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            <p class="empty-state__text">No applicators found for this machine.</p>
        </div>
    </main>

    <!-- ── Toast container ────────────────────────────────────── -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
