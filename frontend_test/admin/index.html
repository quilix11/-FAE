<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar__brand">
                <div class="sidebar__logo">F</div>
                <div class="sidebar__brand-text">Applicator Control</div>
            </div>
            <nav class="sidebar__nav">
                <a href="#overview" class="nav-item active">Overview</a>
                <a href="#machines" class="nav-item">Machines</a>
                <a href="#applicators" class="nav-item">Applicators</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="header__title">Control Center</h1>
                    <span class="badge badge--admin">TECH ADMIN</span>
                </div>
                <div class="header__actions">
                    <button class="btn btn--refresh" id="refreshBtn">Refresh</button>
                    <div class="clock" id="clock">--:--:--</div>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- KPIs -->
                <section class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-card__label">Total Applicators</div>
                        <div class="kpi-card__value" id="kpiTotal">0</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-card__label">In Use</div>
                        <div class="kpi-card__value text-primary" id="kpiInUse">0</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-card__label">On Rack</div>
                        <div class="kpi-card__value text-info" id="kpiOnRack">0</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-card__label">Machines Full</div>
                        <div class="kpi-card__value text-danger" id="kpiFull">0</div>
                    </div>
                </section>

                <!-- Zones Overview -->
                <section class="section" id="overview">
                    <h2 class="section__title">Zone Overview</h2>
                    <div class="zone-grid" id="zoneGrid">
                        <!-- Zones rendered here -->
                    </div>
                </section>

                <!-- Machines -->
                <section class="section" id="machines">
                    <div class="section__header">
                        <h2 class="section__title">Machines</h2>
                        <button class="btn btn-primary" onclick="openMachineModal()">+ Add Machine</button>
                    </div>
                    <div class="machine-grid" id="machineGrid">
                        <!-- Machines rendered here -->
                    </div>
                </section>

                <!-- Applicators -->
                <section class="section" id="applicators">
                    <div class="section__header">
                        <h2 class="section__title">All Applicators</h2>
                        <div style="display: flex; gap: 12px;">
                            <input type="text" id="searchInput" class="search-input" placeholder="Search by Serial Number..." />
                            <button class="btn btn-primary" onclick="openApplicatorModal()">+ Add Applicator</button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Serial Number</th>
                                    <th>Machine</th>
                                    <th>Zone</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="applicatorTableBody">
                                <!-- Applicators rendered here -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="machineModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Machine</h2>
                <button class="close-btn" onclick="closeModals()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Hardware Code</label>
                    <input type="text" id="newMachineCode" class="search-input" style="width:100%" placeholder="e.g. M01" />
                </div>
                <div class="form-group" style="margin-top:16px;">
                    <label>Zone</label>
                    <select id="newMachineZone" class="search-input" style="width:100%">
                        <option value="">Loading zones...</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="margin-top:24px; width:100%" onclick="submitMachine()">Add Machine</button>
            </div>
        </div>
    </div>

    <div id="applicatorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Applicator</h2>
                <button class="close-btn" onclick="closeModals()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Serial Number</label>
                    <input type="text" id="newAppSerial" class="search-input" style="width:100%" placeholder="e.g. APP-001" />
                </div>
                <div class="form-group" style="margin-top:16px;">
                    <label>Machine ID (Optional)</label>
                    <input type="number" id="newAppMachine" class="search-input" style="width:100%" placeholder="Leave empty if none" />
                </div>
                <div class="form-group" style="margin-top:16px;">
                    <label>State</label>
                    <select id="newAppState" class="search-input" style="width:100%">
                        <option value="none">None</option>
                        <option value="on_rack">On Rack</option>
                        <option value="in_use">In Use</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="margin-top:24px; width:100%" onclick="submitApplicator()">Add Applicator</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>
    <script src="app.js"></script>
</body>
</html>
