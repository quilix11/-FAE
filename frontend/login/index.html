<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Fujikura — Вхід</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
    <div class="login-container">
        <div class="brand">
            <div class="logo">F</div>
            <h1>Система обліку аплікаторів</h1>
            <p class="brand-sub">Fujikura Manufacturing</p>
        </div>

        <!-- Step 1: Role selection -->
        <div id="roleStep" class="auth-card">
            <h2 class="card-title">Хто ви?</h2>
            <p class="card-subtitle">Оберіть тип облікового запису</p>

            <div class="role-grid">
                <button type="button" class="role-card" id="selectAdmin" onclick="selectRole('admin')">
                    <div class="role-icon role-icon--admin">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <div class="role-card__title">Адміністратор</div>
                    <div class="role-card__desc">Керування машинами та аплікаторами</div>
                </button>
                <button type="button" class="role-card" id="selectOperator" onclick="selectRole('operator')">
                    <div class="role-icon role-icon--operator">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/></svg>
                    </div>
                    <div class="role-card__title">Оператор</div>
                    <div class="role-card__desc">Робота на конкретній машині</div>
                </button>
            </div>
        </div>

        <!-- Step 2: Login form -->
        <div id="loginStep" class="auth-card" style="display:none">
            <button type="button" class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Назад
            </button>

            <div class="role-badge" id="roleBadge">Адміністратор</div>
            <h2 class="card-title" id="loginTitle">Вхід адміністратора</h2>

            <div id="errorMsg" class="error-msg" style="display:none"></div>

            <div class="form-group" id="usernameGroup">
                <label id="usernameLabel">Логін</label>
                <input type="text" id="username" placeholder="Введіть логін" autocomplete="username" />
            </div>

            <div class="form-group" id="machineGroup" style="display:none;">
                <label>Машина</label>
                <select id="machineSelect">
                    <option value="">Завантаження...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Введіть пароль" autocomplete="current-password" />
            </div>

            <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Увійти</button>

            <div class="demo-hint" id="demoHint">
                <strong>Демо:</strong>
                <span id="demoText">admin / admin</span>
            </div>
        </div>
    </div>

    <script src="app.js?v=6"></script>
</body>
</html>
